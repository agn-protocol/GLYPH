<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GLYPH — общение без слов</title>
  <meta name="description" content="Социальная сеть где люди общаются только образами и символами">
  <meta name="theme-color" content="#fafaf8">
  <link rel="stylesheet" href="style.css">

  <!-- Open Graph -->
  <meta property="og:title" content="GLYPH">
  <meta property="og:description" content="Общение без слов — только образы">
  <meta property="og:url" content="https://agn-protocol.github.io/GLYPH">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="GLYPH">
</head>
<body>
<div id="root">
<div class="app">

  <div class="topbar">
    <div class="logo">
      <svg viewBox="0 0 22 22" width="22" height="22">
        <rect x="2" y="2" width="7" height="7" rx="2" fill="currentColor" opacity=".7"/>
        <rect x="13" y="2" width="7" height="7" rx="2" fill="currentColor" opacity=".35"/>
        <rect x="2" y="13" width="7" height="7" rx="2" fill="currentColor" opacity=".35"/>
        <rect x="13" y="13" width="7" height="7" rx="2" fill="currentColor" opacity=".7"/>
      </svg>
      <span class="logo-name">GLYPH</span>
    </div>
    <div class="db-status" id="db-status">● локально</div>
  </div>

  <!-- РЕГИСТРАЦИЯ -->
  <div id="s-reg" class="screen active">
    <div class="rwrap">
      <div>
        <div class="rlogo">
          <svg viewBox="0 0 22 22" width="26" height="26">
            <rect x="2" y="2" width="7" height="7" rx="2" fill="currentColor" opacity=".7"/>
            <rect x="13" y="2" width="7" height="7" rx="2" fill="currentColor" opacity=".35"/>
            <rect x="2" y="13" width="7" height="7" rx="2" fill="currentColor" opacity=".35"/>
            <rect x="13" y="13" width="7" height="7" rx="2" fill="currentColor" opacity=".7"/>
          </svg>
          <span class="rlogo-name">GLYPH</span>
        </div>
        <div class="rtag">общение без слов — только образы</div>
      </div>
      <div class="fld">
        <label>почта</label>
        <input type="email" id="r-email" placeholder="you@example.com"/>
      </div>
      <div class="fld">
        <label>пароль</label>
        <input type="password" id="r-pass" placeholder="••••••••"/>
      </div>
      <div id="r-name-field" class="fld">
        <label>как тебя называть (необязательно)</label>
        <input type="text" id="r-name" placeholder=""/>
      </div>
      <div class="errmsg" id="r-err"></div>
      <button class="pbtn" id="r-submit" onclick="doReg()">создать аккаунт</button>
      <div class="rsw" id="r-switch">уже есть аккаунт?
        <span onclick="toggleMode()">войти</span>
      </div>
    </div>
  </div>

  <!-- ЛЕНТА -->
  <div id="s-feed" class="screen">
    <div class="scroll" id="feed-list"></div>
  </div>

  <!-- ДИАЛОГ -->
  <div id="s-chat" class="screen">
    <div class="slabel" id="chat-with-label">диалог</div>
    <div class="chat-body" id="chat-body"></div>
    <div class="compose">
      <div class="chint" onclick="openLibraryForChat()">выбери образ...</div>
      <div class="sbtn" onclick="sendChatMsg()">
        <svg viewBox="0 0 16 16" fill="none" width="14" height="14">
          <path d="M3 13 L13 8 L3 3 L3 7 L10 8 L3 9 Z" fill="currentColor"/>
        </svg>
      </div>
    </div>
  </div>

  <!-- ПОИСК -->
  <div id="s-search" class="screen">
    <div class="swrap">
      <input class="sinput" placeholder="найти по образам..."
        id="search-input" oninput="filterSearch()"/>
    </div>
    <div class="slabel">похожие профили</div>
    <div class="scroll" id="search-list"></div>
  </div>

  <!-- СОБЫТИЯ -->
  <div id="s-notif" class="screen">
    <div class="slabel">события</div>
    <div class="scroll" id="notif-list"></div>
  </div>

  <!-- КОНТАКТЫ -->
  <div id="s-contacts" class="screen">
    <div class="slabel">контакты</div>
    <div class="scroll" id="contacts-list"></div>
  </div>

  <!-- ПРОФИЛЬ -->
  <div id="s-profile" class="screen">
    <div class="scroll">
      <div class="ptop">
        <div class="pemail" id="prof-email-top"></div>
        <div class="slabel" style="padding:8px 0 4px">мои образы</div>
        <div class="pglyphs" id="prof-glyphs"></div>
      </div>
      <div class="slabel">библиотека — выбери до 8 образов</div>
      <div class="lgrid" id="lib-profile"></div>
      <div class="slabel">настройки</div>
      <div class="srow">
        <span class="slbl">почта</span>
        <span class="sval" id="prof-email"></span>
        <span class="sarr">›</span>
      </div>
      <div class="srow" onclick="alert('отправим письмо для смены пароля')">
        <span class="slbl">пароль</span>
        <span class="sval">••••••</span>
        <span class="sarr">›</span>
      </div>
      <div class="logout" onclick="doLogout()">
        <span>выйти из аккаунта</span>
      </div>
    </div>
  </div>

  <!-- ДЕТАЛЬНЫЙ ЭКРАН -->
  <div id="s-detail" class="screen">
    <div class="dh">
      <div class="dbk" onclick="goBack()">‹ назад</div>
      <div class="dttl" id="detail-title"></div>
    </div>
    <div class="dbody" id="detail-body"></div>
  </div>

  <!-- БИБЛИОТЕКА ДЛЯ ЧАТА -->
  <div id="s-library" class="screen">
    <div class="dh">
      <div class="dbk" onclick="goBack()">‹ назад</div>
      <div class="dttl">выбери образ</div>
    </div>
    <div class="scroll">
      <div class="lgrid" id="lib-chat"></div>
    </div>
  </div>

  <!-- НИЖНЯЯ НАВИГАЦИЯ -->
  <div class="bnav" id="bottom-nav" style="display:none">
    <div class="nb active" id="nb-feed" onclick="switchTab('feed')">
      <svg viewBox="0 0 20 20" fill="none">
        <rect x="3" y="3" width="5" height="5" rx="1.5" stroke="currentColor" stroke-width="1.2"/>
        <rect x="12" y="3" width="5" height="5" rx="1.5" stroke="currentColor" stroke-width="1.2"/>
        <rect x="3" y="12" width="5" height="5" rx="1.5" stroke="currentColor" stroke-width="1.2"/>
        <rect x="12" y="12" width="5" height="5" rx="1.5" stroke="currentColor" stroke-width="1.2"/>
      </svg>
      лента
    </div>
    <div class="nb" id="nb-contacts" onclick="switchTab('contacts')">
      <svg viewBox="0 0 20 20" fill="none">
        <circle cx="7" cy="8" r="3" stroke="currentColor" stroke-width="1.2"/>
        <path d="M2 16 C2 13 4 11 7 11 C10 11 12 13 12 16"
          stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
        <path d="M14 8 L18 8 M16 6 L16 10"
          stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
      контакты
    </div>
    <div class="nb" id="nb-search" onclick="switchTab('search')">
      <svg viewBox="0 0 20 20" fill="none">
        <circle cx="9" cy="9" r="5" stroke="currentColor" stroke-width="1.2"/>
        <line x1="13" y1="13" x2="17" y2="17"
          stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
      поиск
    </div>
    <div class="nb" id="nb-notif" onclick="switchTab('notif')">
      <svg viewBox="0 0 20 20" fill="none">
        <path d="M10 3 C7.5 3 5.5 5 5.5 7.5 L5.5 12 L3.5 14
          L16.5 14 L14.5 12 L14.5 7.5 C14.5 5 12.5 3 10 3Z"
          stroke="currentColor" stroke-width="1.2" fill="none"/>
        <path d="M8 14 C8 15.1 9 16 10 16 C11 16 12 15.1 12 14"
          stroke="currentColor" stroke-width="1.2"/>
      </svg>
      события
      <div class="nbadge" id="badge-notif" style="display:none">3</div>
    </div>
    <div class="nb" id="nb-profile" onclick="switchTab('profile')">
      <svg viewBox="0 0 20 20" fill="none">
        <circle cx="10" cy="7" r="3.5" stroke="currentColor" stroke-width="1.2"/>
        <path d="M4 17 C4 14 6.5 12 10 12 C13.5 12 16 14 16 17"
          stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
      я
    </div>
  </div>

</div>
</div>

<script src="glyphs.js"></script>
<script src="app.js"></script>
</body>
</html>
